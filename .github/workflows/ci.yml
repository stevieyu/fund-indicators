# CI — 持续集成
# 在每次 push 到 main 和每个 PR 时运行测试、类型检查和构建

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build (Node + Browser)
        run: pnpm run build

      - name: Verify build output
        run: |
          test -f dist/index.mjs    || (echo "Missing dist/index.mjs" && exit 1)
          test -f dist/index.cjs    || (echo "Missing dist/index.cjs" && exit 1)
          test -f dist/index.d.cts  || (echo "Missing dist/index.d.cts" && exit 1)
          echo "Node build output verified."
